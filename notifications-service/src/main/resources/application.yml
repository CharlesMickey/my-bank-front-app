server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: notifications-service
  datasource:
    url: ${NOTIFICATIONS_DB_URL:jdbc:postgresql://localhost:5432/bank}
    username: ${NOTIFICATIONS_DB_USER:bank}
    password: ${NOTIFICATIONS_DB_PASSWORD:bank}
  flyway:
    schemas: notifications
    default-schema: notifications
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notifications
  kafka:
    bootstrap-servers: ${BANK_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      ack-mode: record
      observation-enabled: true
    consumer:
      group-id: ${BANK_NOTIFICATIONS_GROUP:notifications-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.yandex.practicum.mybank.common.dto"
        spring.json.value.default.type: ru.yandex.practicum.mybank.common.dto.NotificationRequest
bank:
  notifications:
    topic: ${BANK_NOTIFICATIONS_TOPIC:bank.notifications}

management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      access: read-only
      probes:
        enabled: true
    info:
      access: read-only
    prometheus:
      access: read-only
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  simple:
    metrics:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${BANK_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    root: INFO
