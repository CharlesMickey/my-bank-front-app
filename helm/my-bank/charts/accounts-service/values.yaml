replicaCount: 1

image:
  repository: accounts-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

config:
  serverPort: "8081"
  dbUrl: "jdbc:postgresql://accounts-postgres:5432/accounts"
  dbUser: "accounts"
  jwkSetUri: "http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs"
  kafkaBootstrapServers: "kafka:9092"
  notificationsTopic: "bank.notifications"

secret:
  dbPassword: "accounts"

probes:
  readiness:
    path: "/actuator/health"
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: "/actuator/health"
    initialDelaySeconds: 40
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
