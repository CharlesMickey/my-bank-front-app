replicaCount: 1

image:
  repository: cash-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8082

config:
  serverPort: "8082"
  accountsUrl: "http://accounts-service:8081"
  jwkSetUri: "http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs"
  tokenUri: "http://keycloak:8080/realms/my-bank/protocol/openid-connect/token"
  clientId: "cash-service"
  kafkaBootstrapServers: "kafka:9092"
  notificationsTopic: "bank.notifications"
  zipkinEndpoint: "http://zipkin:9411/api/v2/spans"
  logstashHost: "logstash"
  logstashPort: "5000"

secret:
  clientSecret: "cash-secret"

probes:
  readiness:
    path: "/actuator/health"
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: "/actuator/health"
    initialDelaySeconds: 40
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
