apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: topic-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -ec
            - |
              i=0
              until kafka-topics.sh --bootstrap-server kafka:{{ .Values.service.clientPort }} --list >/dev/null 2>&1; do
                i=$((i + 1))
                if [ "$i" -ge 30 ]; then
                  exit 1
                fi
                sleep 2
              done
              kafka-topics.sh \
                --bootstrap-server kafka:{{ .Values.service.clientPort }} \
                --create \
                --if-not-exists \
                --topic {{ .Values.topic.name }} \
                --partitions {{ .Values.topic.partitions }} \
                --replication-factor {{ .Values.topic.replicationFactor }}
