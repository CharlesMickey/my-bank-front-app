apiVersion: v1
kind: Pod
metadata:
  name: kafka-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: kafka-test
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      command:
        - /bin/bash
        - -ec
        - |
          i=0
          until kafka-topics.sh --bootstrap-server kafka:{{ .Values.service.clientPort }} --list | grep -q '^{{ .Values.topic.name }}$'; do
            i=$((i + 1))
            if [ "$i" -ge 30 ]; then
              exit 1
            fi
            sleep 2
          done
