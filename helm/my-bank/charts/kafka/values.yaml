image:
  repository: bitnami/kafka
  tag: 3.7.0
  pullPolicy: IfNotPresent

service:
  clientPort: 9092
  controllerPort: 9093

persistence:
  size: 2Gi

topic:
  name: bank.notifications
  partitions: 1
  replicationFactor: 1

kraft:
  clusterId: MkU3OEVBNTcwNTJENDM2Qk

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
