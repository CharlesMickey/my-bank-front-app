replicaCount: 1

image:
  repository: openzipkin/zipkin
  tag: "3.5.1"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 9411
  nodePort: 30094

probes:
  readiness:
    path: "/health"
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: "/health"
    initialDelaySeconds: 40
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
