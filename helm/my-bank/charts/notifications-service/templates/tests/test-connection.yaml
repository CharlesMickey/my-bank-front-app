apiVersion: v1
kind: Pod
metadata:
  name: notifications-service-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: notifications-service-test
  restartPolicy: Never
  containers:
    - name: kubectl
      image: bitnami/kubectl:1.30.2
      env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      command:
        - /bin/sh
        - -c
        - |
          kubectl wait --namespace "$POD_NAMESPACE" --for=condition=Ready pod -l app=notifications-service --timeout=120s
