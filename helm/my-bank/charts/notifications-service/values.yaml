replicaCount: 1

image:
  repository: notifications-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8084

config:
  serverPort: "8084"
  dbUrl: "jdbc:postgresql://notifications-postgres:5432/notifications"
  dbUser: "notifications"
  jwkSetUri: "http://keycloak:8080/realms/my-bank/protocol/openid-connect/certs"

secret:
  dbPassword: "notifications"

probes:
  readiness:
    path: "/actuator/health"
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: "/actuator/health"
    initialDelaySeconds: 40
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
