replicaCount: 1

image:
  repository: notifications-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  enabled: false

config:
  dbUrl: "jdbc:postgresql://notifications-postgres:5432/notifications"
  dbUser: "notifications"
  kafkaBootstrapServers: "kafka:9092"
  notificationsTopic: "bank.notifications"
  consumerGroup: "notifications-service"

secret:
  dbPassword: "notifications"

probes:
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
