replicaCount: 1

image:
  repository: grafana/grafana
  tag: "11.5.2"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  nodePort: 30093

config:
  adminUser: "admin"
  adminPassword: "admin"
  prometheusUrl: "http://prometheus:9090"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
