replicaCount: 1

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432

config:
  database: "notifications"
  username: "notifications"
  pgData: "/var/lib/postgresql/data/pgdata"

secret:
  password: "notifications"

persistence:
  size: 1Gi
  storageClassName: ""
