apiVersion: v1
kind: Service
metadata:
  name: logstash
spec:
  type: {{ .Values.service.type }}
  selector:
    app: logstash
  ports:
    - name: input
      port: {{ .Values.service.inputPort }}
      targetPort: input
{{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
{{- end }}
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
