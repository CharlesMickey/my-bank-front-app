server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: gateway-service
  reactor:
    context-propagation: auto
  cloud:
    gateway:
      routes:
        - id: accounts-service
          uri: ${BANK_ACCOUNTS_URL:http://localhost:8081}
          predicates:
            - Path=/api/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accounts
        - id: cash-service
          uri: ${BANK_CASH_URL:http://localhost:8082}
          predicates:
            - Path=/api/cash/**
          filters:
            - name: CircuitBreaker
              args:
                name: cash
        - id: transfer-service
          uri: ${BANK_TRANSFER_URL:http://localhost:8083}
          predicates:
            - Path=/api/transfers/**
          filters:
            - name: CircuitBreaker
              args:
                name: transfer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${BANK_JWK_SET_URI:http://localhost:9090/realms/my-bank/protocol/openid-connect/certs}

resilience4j:
  circuitbreaker:
    instances:
      accounts:
        sliding-window-size: 5
        failure-rate-threshold: 50
      cash:
        sliding-window-size: 5
        failure-rate-threshold: 50
      transfer:
        sliding-window-size: 5
        failure-rate-threshold: 50

management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      access: read-only
      probes:
        enabled: true
    info:
      access: read-only
    prometheus:
      access: read-only
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  simple:
    metrics:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${BANK_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    root: INFO
