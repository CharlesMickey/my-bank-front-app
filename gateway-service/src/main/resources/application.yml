server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: accounts-service
          uri: ${BANK_ACCOUNTS_URL:http://localhost:8081}
          predicates:
            - Path=/api/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accounts
        - id: cash-service
          uri: ${BANK_CASH_URL:http://localhost:8082}
          predicates:
            - Path=/api/cash/**
          filters:
            - name: CircuitBreaker
              args:
                name: cash
        - id: transfer-service
          uri: ${BANK_TRANSFER_URL:http://localhost:8083}
          predicates:
            - Path=/api/transfers/**
          filters:
            - name: CircuitBreaker
              args:
                name: transfer
        - id: notifications-service
          uri: ${BANK_NOTIFICATIONS_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notifications
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${BANK_JWK_SET_URI:http://localhost:9090/realms/my-bank/protocol/openid-connect/certs}

resilience4j:
  circuitbreaker:
    instances:
      accounts:
        sliding-window-size: 5
        failure-rate-threshold: 50
      cash:
        sliding-window-size: 5
        failure-rate-threshold: 50
      transfer:
        sliding-window-size: 5
        failure-rate-threshold: 50
      notifications:
        sliding-window-size: 5
        failure-rate-threshold: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info
